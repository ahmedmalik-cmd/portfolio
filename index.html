<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
</head>
<body>

  <header>
    <a href="/" class="logo" id="site-name">—</a>
    <nav>
      <a href="/#work">Work</a>
      <a href="/#about">About</a>
    </nav>
  </header>

  <main>
    <section class="hero">
      <div class="hero-text">
        <p class="eyebrow">Portfolio</p>
        <h1 id="hero-title">—</h1>
        <p id="hero-bio" class="bio">—</p>
      </div>
    </section>

    <section class="work" id="work">
      <div class="grid" id="project-grid">
        <!-- Injected by JS -->
      </div>
    </section>

    <section class="about" id="about">
      <div class="about-inner">
        <p class="eyebrow">About</p>
        <p id="about-bio">—</p>
        <a id="about-email" href="#">—</a>
      </div>
    </section>
  </main>

  <footer>
    <span id="footer-name">—</span>
    <span id="footer-year"></span>
  </footer>

  <script src="/js/main.js"></script>
</body>
</html>
